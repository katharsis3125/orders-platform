<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      font-size: 14px;
      flex: 1;
      min-width: 220px;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #2d6cdf;
      color: white;
    }

    button:hover {
      background: #1f57ba;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f0f0f0;
    }

    .status-created {
      color: #b26b00;
      font-weight: bold;
    }

    .status-processed {
      color: #0a7a2f;
      font-weight: bold;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
    }

    .error {
      color: #b00020;
    }

    .success {
      color: #0a7a2f;
    }
  </style>
</head>
<body>
  <h1>Orders Platform</h1>
  <p>Simple frontend for API + PostgreSQL + Kafka + Worker</p>

  <div class="card">
    <h2>Create order</h2>
    <form id="order-form">
      <input type="text" id="customer_name" placeholder="Customer name" required />
      <input type="text" id="product" placeholder="Product" required />
      <button type="submit">Create order</button>
    </form>
    <div id="form-message" class="message"></div>
  </div>

  <div class="card">
    <h2>Orders</h2>
    <button id="refresh-btn">Refresh orders</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Product</th>
          <th>Status</th>
          <th>Created at</th>
        </tr>
      </thead>
      <tbody id="orders-table-body">
      </tbody>
    </table>
  </div>

  <script>
  const API_BASE_URL = "/api";

  async function fetchOrders() {
    const tbody = document.getElementById("orders-table-body");
    tbody.innerHTML = "";

    try {
      const response = await fetch(`${API_BASE_URL}/orders`);
      const orders = await response.json();

      for (const order of orders) {
        const row = document.createElement("tr");

        const statusClass =
          order.status === "processed" ? "status-processed" : "status-created";

        row.innerHTML = `
          <td>${order.id}</td>
          <td>${order.customer_name}</td>
          <td>${order.product}</td>
          <td class="${statusClass}">${order.status}</td>
          <td>${order.created_at}</td>
        `;

        tbody.appendChild(row);
      }
    } catch (error) {
      console.error("Failed to fetch orders:", error);
    }
  }

  async function createOrder(event) {
    event.preventDefault();

    const customerName = document.getElementById("customer_name").value.trim();
    const product = document.getElementById("product").value.trim();
    const message = document.getElementById("form-message");

    message.textContent = "";
    message.className = "message";

    try {
      const response = await fetch(`${API_BASE_URL}/orders`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          customer_name: customerName,
          product: product
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.detail || "Unknown error");
      }

      message.textContent = `Order #${data.id} created successfully`;
      message.classList.add("success");

      document.getElementById("order-form").reset();

      await fetchOrders();
      setTimeout(fetchOrders, 2000);
    } catch (error) {
      message.textContent = `Error: ${error.message}`;
      message.classList.add("error");
    }
  }

  document.getElementById("order-form").addEventListener("submit", createOrder);
  document.getElementById("refresh-btn").addEventListener("click", fetchOrders);

  fetchOrders();
</script>
</body>
</html>
