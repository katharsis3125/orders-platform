  POSTGRES_PORT: "5432"
  POSTGRES_DB: orders_db
  KAFKA_BOOTSTRAP_SERVERS: "my-cluster-kafka-bootstrap.kafka.svc:9092"
  KAFKA_TOPIC_ORDERS: "orders"
  KAFKA_CONSUMER_GROUP: "orders-worker-group"